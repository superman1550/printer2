<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <title>列表编辑</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="Keywords" content="html5,javascript,web development,peach,printer,设计器" />
    <meta name="Description" content="Peach-Printer 模版设计器" />
    <link rel="shortcut icon" href="logo.png">
    <link rel="stylesheet" href="../layui.css">
    <link rel="stylesheet" href="../icon/iconfont.css">
    <link rel="stylesheet" href="../icon2/iconfont.css">
    <script src="../layui.js"></script>
</head>

<body>
    <div class="layui-form"  style="padding: 20px;">
        <div class="layui-form-item">
            <div class="layui-inline">
                <label class="layui-form-label">控件端口</label>
                <div class="layui-input-inline layui-input-wrap">
                    <input type="tel"  lay-affix="number" autocomplete="off" class="layui-input">
                    
                </div>
                <div class="layui-form-mid" style="padding: 0!important;"> 
                    <button type="button" class="layui-btn" lay-on="get-vercode">保存设置</button>
                  </div>
            </div>
        </div>
    </div>
</body>

</html>
