<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <title>列表编辑</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="Keywords" content="html5,javascript,web development,peach,printer,设计器" />
    <meta name="Description" content="Peach-Printer 模版设计器" />
    <link rel="shortcut icon" href="logo.png">
    <style>
        .main-content {
            width: 100%;
            height: 100%;
            padding: 10px;
            box-sizing: border-box;
        }

        .logo-name {
            text-align: center;
            font-size: 20px;
            margin-top: 20px;
            font-weight: 700;
        }

        .version {
            text-align: center;
            font-size: 16px;
            margin: 15px;
        }

        .contact {
            font-size: 14px;
            text-align: center;
            padding-top: 10px;            
        }

        .label {
            display: inline-block;
            width: 74px;
            text-align: right;
            font-weight: 700;
        }

        .value {
            display: inline-block;
            width: 120px;
            text-align: left;
            vertical-align: middle;
        }

        a{
            color: blue;
        }
    </style>
</head>

<body>
    <div class="main-content">
        <div class="logo-name">
            Peach-Printer Web打印服务
        </div>
        <div class="version">
            编辑器版本：2.0.5
        </div>
        <div class="contact">
            <div class="label">官网网址:</div>
            <div class="value"><a href="https://jpeach.cn" target="_blank">jpeach.cn</a></div>
        </div>
        <div class="contact">
            <div class="label">联系QQ:</div>
            <div class="value">1050147920</div>
        </div>
        <div class="contact">
            <div class="label">交流群:</div>
            <div class="value">
                <a target="_blank" href="https://qm.qq.com/cgi-bin/qm/qr?k=PRcXtfhczXe1J9TRaKRGbUmNDK7t4sn9&jump_from=webapi&authKey=Rq5YjMYz+Bw/1PZgD5JIGWidIOBm+VT1x50nUuT8+SMpbmhjdhZCUCqk9+imBnB4"><img border="0" src="//pub.idqqimg.com/wpa/images/group.png" alt="PeachWeb组件" title="PeachWeb组件"></a>
            </div>
        </div>
        <div class="contact">
            <div class="label">电子邮箱:</div>
            <div class="value"><a href="mailto:1050147920@qq.com">1050147920@qq.com</a></div>
        </div>
    </div>
</body>

</html>
