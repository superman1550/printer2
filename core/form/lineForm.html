<table class="pch-form">
    <tr>
        <td class="form-label">起点坐标</td>
        <td class="form-value">
            <input type="number" class="form-input-number form-half"  id="form-ax1">
            <input type="number" class="form-input-number form-half"  id="form-ay1">
        </td>
    </tr>
    <tr>
        <td class="form-label">终点坐标</td>
        <td class="form-value">
            <input type="number" class="form-input-number form-half"  id="form-ax2">
            <input type="number" class="form-input-number form-half"  id="form-ay2">
        </td>
    </tr>
    <tr>
        <td class="form-label">形状类型</td>
        <td class="form-value">
            <select name="" id="form-type" class="form-input-select" style="width: 180px;">
                <option value="0">线条</option>
                <option value="1">椭圆</option>
                <option value="2">矩形</option>
            </select>
        </td>
    </tr>
    <tr>
        <td class="form-label">线条样式</td>
        <td class="form-value">
            <select name="" id="" class="form-input-select" style="width: 180px;">
                <option value="">实线1</option>
                <option value="">实线2</option>
                <option value="">虚线1</option>
                <option value="">虚线2</option>
            </select>
        </td>
    </tr>
    <tr>
        <td class="form-label">宽度颜色</td>
        <td class="form-value">
            <select name="" id="form-weight" class="form-input-select" style="width: 190px;">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
            </select>
            <input type="color" name="" id="form-color" class="form-input-color">
        </td>
    </tr>
</table>
