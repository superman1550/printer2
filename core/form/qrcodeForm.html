<table class="pch-form">
    <tr>
        <td class="form-label">起点坐标</td>
        <td class="form-value">
            <input type="number" class="form-input-number form-half"  id="form-ax1">
            <input type="number" class="form-input-number form-half"  id="form-ay1">
        </td>
    </tr>
    <tr>
        <td class="form-label">终点坐标</td>
        <td class="form-value">
            <input type="number" class="form-input-number form-half"  id="form-ax2">
            <input type="number" class="form-input-number form-half"  id="form-ay2">
        </td>
    </tr>
    <tr>
        <td class="form-label">编码类型</td>
        <td class="form-value">
            <div class="form-button-radio" lay-radio="type" data-value="1">变量</div>
            <div class="form-button-radio" lay-radio="type" data-value="0">固定值</div>
        </td>
    </tr>
    <tr>
        <td class="form-label">编码内容</td>
        <td class="form-value">
            <textarea class="form-input-textarea" id="form-code" ></textarea>
        </td>
    </tr>
</table>
